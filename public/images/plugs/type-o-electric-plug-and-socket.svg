<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Type O Plug (Thailand) -->
  <rect x="10" y="20" width="35" height="60" rx="5" fill="#f3f4f6" stroke="#6b7280" stroke-width="2"/>
  <!-- Pins -->
  <circle cx="20" cy="40" r="3" fill="#374151"/>
  <circle cx="35" cy="40" r="3" fill="#374151"/>
  <circle cx="27.5" cy="55" r="3" fill="#374151"/>
  
  <!-- Type O Socket -->
  <rect x="55" y="20" width="35" height="60" rx="5" fill="#e5e7eb" stroke="#6b7280" stroke-width="2"/>
  <!-- Holes -->
  <circle cx="65" cy="40" r="3" fill="#1f2937"/>
  <circle cx="80" cy="40" r="3" fill="#1f2937"/>
  <circle cx="72.5" cy="55" r="3" fill="#1f2937"/>
  
  <!-- Label -->
  <text x="50" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6b7280">Type O</text>
</svg>