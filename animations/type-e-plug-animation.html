<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Type E — French CEE 7/5 Animation</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#f7f5f2;font-family:'DM Sans',sans-serif;padding:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh}
  .plug-card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.05),0 3px 12px rgba(0,0,0,0.03);max-width:700px;width:100%}
  .plug-card__head{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid #f0eeeb}
  .plug-card__name{display:flex;align-items:baseline;gap:6px}
  .plug-card__name h3{font-size:18px;font-weight:700;color:#2a2a2a}
  .plug-card__name h3 span{color:#c85a3a}
  .plug-card__name .sub{font-size:11px;color:#aaa}
  .plug-card__volt{font-size:10px;padding:3px 9px;border-radius:100px;background:rgba(200,90,58,0.07);color:#c85a3a;font-weight:500;letter-spacing:0.3px}
  .plug-card__body{display:flex;align-items:stretch;position:relative;height:180px;background:#f4f2ef}
  .plug-card__scene{flex:1;position:relative;cursor:pointer;min-width:0}
  .plug-card__scene canvas{display:block;width:100%;height:100%}
  .plug-card__specs{width:120px;flex-shrink:0;display:flex;flex-direction:column;justify-content:center;gap:10px;padding:12px 14px;background:rgba(255,255,255,0.85);backdrop-filter:blur(6px);border-left:1px solid rgba(0,0,0,0.04)}
  .spec-item{display:flex;flex-direction:column}
  .spec-item__label{font-size:8.5px;letter-spacing:1.2px;text-transform:uppercase;color:#bbb;margin-bottom:1px;line-height:1}
  .spec-item__value{font-size:14px;font-weight:600;color:#444;line-height:1.2}
  .replay-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(244,242,239,0.45);opacity:0;transition:opacity 0.4s;pointer-events:none;z-index:2}
  .replay-overlay.visible{opacity:1;pointer-events:auto}
  .replay-btn-3d{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.9);border:1.5px solid #ddd;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
  .replay-btn-3d:hover{border-color:#c85a3a;background:#fff;transform:scale(1.08)}
  .replay-btn-3d svg{width:16px;height:16px;fill:none;stroke:#999;stroke-width:2;stroke-linecap:round}
  .replay-btn-3d:hover svg{stroke:#c85a3a}
  .plug-card__progress{height:2px;background:#eee}
  .plug-card__progress-fill{height:100%;width:0%;background:#c85a3a}
</style>
</head>
<body>
<div class="plug-card">
  <div class="plug-card__head">
    <div class="plug-card__name"><h3><span>Type E</span></h3><span class="sub">CEE 7/5 — French</span></div>
    <span class="plug-card__volt">230V / 50Hz</span>
  </div>
  <div class="plug-card__body">
    <div class="plug-card__scene" id="scene">
      <canvas id="cv"></canvas>
      <div class="replay-overlay" id="ro">
        <div class="replay-btn-3d" id="rb"><svg viewBox="0 0 24 24"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg></div>
      </div>
    </div>
    <div class="plug-card__specs">
      <div class="spec-item"><div class="spec-item__label">Pins</div><div class="spec-item__value">2 round</div></div>
      <div class="spec-item"><div class="spec-item__label">Diameter</div><div class="spec-item__value">4.8 mm</div></div>
      <div class="spec-item"><div class="spec-item__label">Ground</div><div class="spec-item__value">Socket pin</div></div>
      <div class="spec-item"><div class="spec-item__label">Rated</div><div class="spec-item__value">16A</div></div>
    </div>
  </div>
  <div class="plug-card__progress"><div class="plug-card__progress-fill" id="pf"></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const canvas = document.getElementById('cv');
const sceneEl = document.getElementById('scene');
const replayOverlay = document.getElementById('ro');
const replayBtn = document.getElementById('rb');
const pfEl = document.getElementById('pf');

const rect = sceneEl.getBoundingClientRect();
const w = Math.round(rect.width) || 560, h = Math.round(rect.height) || 180;
canvas.width = w * 2; canvas.height = h * 2;

const scene3 = new THREE.Scene();
scene3.background = new THREE.Color(0xf4f2ef);

const camera = new THREE.PerspectiveCamera(28, w/h, 0.1, 100);
camera.position.set(-0.3, 1.6, 9.5);
camera.lookAt(0.3, -0.1, 0);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(w, h);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;

scene3.add(new THREE.AmbientLight(0xffffff, 0.45));
const keyL = new THREE.DirectionalLight(0xfff8ee, 0.95);
keyL.position.set(3, 6, 5); keyL.castShadow = true; keyL.shadow.mapSize.set(512, 512);
scene3.add(keyL);
scene3.add(new THREE.DirectionalLight(0xe0ecff, 0.3).translateX(-5).translateY(2).translateZ(3));

function rrShape(sw, sh, r) {
  const s = new THREE.Shape();
  s.moveTo(-sw/2+r, -sh/2); s.lineTo(sw/2-r, -sh/2);
  s.quadraticCurveTo(sw/2, -sh/2, sw/2, -sh/2+r);
  s.lineTo(sw/2, sh/2-r); s.quadraticCurveTo(sw/2, sh/2, sw/2-r, sh/2);
  s.lineTo(-sw/2+r, sh/2); s.quadraticCurveTo(-sw/2, sh/2, -sw/2, sh/2-r);
  s.lineTo(-sw/2, -sh/2+r); s.quadraticCurveTo(-sw/2, -sh/2, -sw/2+r, -sh/2);
  return s;
}

const mW = new THREE.MeshStandardMaterial({ color: 0xf2f2f2, roughness: 0.38 });
const mP = new THREE.MeshStandardMaterial({ color: 0xf0eeea, roughness: 0.3 });
const mR = new THREE.MeshStandardMaterial({ color: 0xd8d5cf, roughness: 0.5 });
const mPin = new THREE.MeshStandardMaterial({ color: 0xccaa55, roughness: 0.18, metalness: 0.92 });
const mD = new THREE.MeshStandardMaterial({ color: 0x060606, roughness: 0.95 });
const mCbl = new THREE.MeshStandardMaterial({ color: 0x1c1c1c, roughness: 0.6 });
const mDP = new THREE.MeshStandardMaterial({ color: 0x282828, roughness: 0.5 });
const mWall = new THREE.MeshStandardMaterial({ color: 0xe2dfd9, roughness: 0.55 });
const mScr = new THREE.MeshStandardMaterial({ color: 0xb8b8b8, roughness: 0.28, metalness: 0.75 });
const mHR = new THREE.MeshStandardMaterial({ color: 0xccc8c2, roughness: 0.4, metalness: 0.1 });
const mSl = new THREE.MeshStandardMaterial({ color: 0x777 });
const mGndMetal = new THREE.MeshStandardMaterial({ color: 0xc0c0c0, roughness: 0.2, metalness: 0.9 });

const PIN_R = 0.075;
const PIN_Z = 0.45;
const GND_Y = 0.55; // ground pin/hole Y position (above center)

// ═══ SOCKET ═══
const sG = new THREE.Group();

const wallM = new THREE.Mesh(new THREE.BoxGeometry(0.4, 3.2, 3.2), mWall);
wallM.position.x = 0.2; wallM.receiveShadow = true; sG.add(wallM);

const fpGeo = new THREE.ExtrudeGeometry(rrShape(2.9, 2.9, 0.15), {
  depth: 0.14, bevelEnabled: true, bevelThickness: 0.025, bevelSize: 0.025, bevelSegments: 3
});
fpGeo.center();
const fpMesh = new THREE.Mesh(fpGeo, mP);
fpMesh.rotation.y = -Math.PI / 2;
fpMesh.castShadow = true; fpMesh.receiveShadow = true;
sG.add(fpMesh);

const recessR = 1.05;
const rcMesh = new THREE.Mesh(new THREE.CylinderGeometry(recessR, recessR, 0.18, 48), mR);
rcMesh.rotation.z = Math.PI / 2; rcMesh.position.x = -0.01;
sG.add(rcMesh);

const rrMesh = new THREE.Mesh(new THREE.TorusGeometry(recessR, 0.02, 8, 48),
  new THREE.MeshStandardMaterial({ color: 0xc5c2bc, roughness: 0.5 }));
rrMesh.rotation.y = Math.PI / 2; rrMesh.position.x = -0.08;
sG.add(rrMesh);

// Pin holes
for (let sign of [-1, 1]) {
  const hm = new THREE.Mesh(new THREE.CylinderGeometry(PIN_R + 0.02, PIN_R + 0.02, 0.7, 24), mD);
  hm.rotation.z = Math.PI / 2; hm.position.set(0.2, 0, sign * PIN_Z);
  sG.add(hm);
  const hr = new THREE.Mesh(new THREE.TorusGeometry(PIN_R + 0.03, 0.018, 8, 24), mHR);
  hr.rotation.y = Math.PI / 2; hr.position.set(-0.08, 0, sign * PIN_Z);
  sG.add(hr);
}

// ★ GROUND PIN protruding from socket — chrome rod sticking out along -X
const gpLen = 0.45;
const gpR = 0.058;
const gpMesh = new THREE.Mesh(new THREE.CylinderGeometry(gpR, gpR, gpLen, 24), mGndMetal);
gpMesh.rotation.z = Math.PI / 2;
gpMesh.position.set(-0.08 - gpLen/2, GND_Y, 0);
gpMesh.castShadow = true;
sG.add(gpMesh);

// Ground pin tip
const gpTip = new THREE.Mesh(new THREE.SphereGeometry(gpR, 16, 10, 0, Math.PI * 2, 0, Math.PI / 2), mGndMetal);
gpTip.rotation.z = -Math.PI / 2;
gpTip.position.set(-0.08 - gpLen, GND_Y, 0);
sG.add(gpTip);

// Ground pin collar at base
const gpBase = new THREE.Mesh(new THREE.CylinderGeometry(gpR + 0.02, gpR + 0.03, 0.05, 24), mGndMetal);
gpBase.rotation.z = Math.PI / 2;
gpBase.position.set(-0.08, GND_Y, 0);
sG.add(gpBase);

// Screws
for (let sy of [-1, 1]) {
  const sc = new THREE.Mesh(new THREE.CylinderGeometry(0.055, 0.055, 0.03, 16), mScr);
  sc.rotation.z = Math.PI / 2; sc.position.set(-0.09, sy * 1.1, 0);
  sG.add(sc);
  for (let r of [0, Math.PI/2]) {
    const sl = new THREE.Mesh(new THREE.BoxGeometry(0.01, 0.075, 0.013), mSl);
    sl.rotation.x = r; sl.position.set(-0.1, sy * 1.1, 0);
    sG.add(sl);
  }
}

sG.position.set(3.2, 0, 0);
scene3.add(sG);

// ═══ PLUG ═══
const pG = new THREE.Group();

// Body (round like Type F)
const bGeo = new THREE.ExtrudeGeometry(rrShape(1.3, 1.3, 0.25), {
  depth: 0.3, bevelEnabled: true, bevelThickness: 0.04, bevelSize: 0.04, bevelSegments: 4
});
bGeo.center();
const bMesh = new THREE.Mesh(bGeo, mW);
bMesh.rotation.y = -Math.PI / 2;
bMesh.castShadow = true;
pG.add(bMesh);

// Nose — slightly recessed front face where pins emerge and hole is
const noseMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.4, 0.14, 32), mW);
noseMesh.rotation.z = -Math.PI / 2; noseMesh.position.x = 0.22;
noseMesh.castShadow = true;
pG.add(noseMesh);

// Two round pins
const PL = 0.55;
for (let sign of [-1, 1]) {
  const pm = new THREE.Mesh(new THREE.CylinderGeometry(PIN_R, PIN_R, PL, 24), mPin);
  pm.rotation.z = -Math.PI / 2; pm.position.set(0.29 + PL/2, 0, sign * PIN_Z);
  pm.castShadow = true;
  pG.add(pm);

  const tm = new THREE.Mesh(new THREE.SphereGeometry(PIN_R, 16, 10, 0, Math.PI * 2, 0, Math.PI / 2), mPin);
  tm.rotation.z = Math.PI / 2; tm.position.set(0.29 + PL, 0, sign * PIN_Z);
  pG.add(tm);
}

// ★ GROUND HOLE — dark recess INTO the plug face
// This is a hole, not a pin. We show it by:
// 1. A dark disc on the plug face (the opening)
// 2. A dark cylinder going INTO the plug body (the depth)
// 3. A subtle rim ring around the opening

// Dark hole opening disc (sits flush on the nose face)
const ghDiscGeo = new THREE.CylinderGeometry(0.075, 0.075, 0.01, 24);
const ghDiscMesh = new THREE.Mesh(ghDiscGeo, mD);
ghDiscMesh.rotation.z = -Math.PI / 2;
ghDiscMesh.position.set(0.29, GND_Y, 0); // flush with the front face
pG.add(ghDiscMesh);

// Dark tunnel going INTO the plug body (recessed, not protruding)
const ghTunnelGeo = new THREE.CylinderGeometry(0.065, 0.065, 0.4, 24);
const ghTunnelMesh = new THREE.Mesh(ghTunnelGeo, mD);
ghTunnelMesh.rotation.z = -Math.PI / 2;
ghTunnelMesh.position.set(0.09, GND_Y, 0); // centered inside the plug body
pG.add(ghTunnelMesh);

// Rim around hole opening (light ring to highlight the hole edge)
const ghRimGeo = new THREE.TorusGeometry(0.08, 0.012, 8, 24);
const ghRimMesh = new THREE.Mesh(ghRimGeo, new THREE.MeshStandardMaterial({ color: 0xe0e0e0, roughness: 0.35 }));
ghRimMesh.rotation.y = Math.PI / 2;
ghRimMesh.position.set(0.295, GND_Y, 0);
pG.add(ghRimMesh);

// Cable
const cblMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 3, 16), mCbl);
cblMesh.rotation.z = -Math.PI / 2; cblMesh.position.x = -1.7; cblMesh.castShadow = true;
pG.add(cblMesh);

// Strain relief
const srMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.09, 0.2, 16), mDP);
srMesh.rotation.z = -Math.PI / 2; srMesh.position.x = -0.26;
pG.add(srMesh);

pG.position.set(-4.5, 0, 0);
scene3.add(pG);

// ═══ ANIMATION — plug faces viewer for ~1s, then rotates and flies into socket ═══
const TX = 2.35, IX = 2.78, DUR = 5000;
let st = null, aId = null, playing = false;

function easeInOutCubic(t) { return t < .5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2; }
function easeOutCubic(t) { return 1 - Math.pow(1-t, 3); }
function lerp(a, b, t) { return a + (b-a) * t; }

// -PI/2 = pins point +Z (toward camera), user sees the front face with pins and hole
const FACE_ROT = -Math.PI / 2;

function getState(t) {
  let px, py, rz, ry;
  const SX = -4.5;
  if (t <= 0.20) {
    // Hold: plug sits on the left, facing the viewer for ~1 second
    px = SX; py = 0; rz = 0; ry = FACE_ROT;
  }
  else if (t <= 0.38) {
    // Start moving right + rotate from facing viewer to facing right
    const p = easeInOutCubic((t - 0.20) / 0.18);
    px = lerp(SX, SX + 2.5, p);
    py = Math.sin(p * Math.PI) * 0.15;
    rz = 0;
    ry = lerp(FACE_ROT, 0.15, p);
  }
  else if (t <= 0.55) {
    // Continue flying right, finish straightening
    const p = easeInOutCubic((t - 0.38) / 0.17);
    px = lerp(SX + 2.5, TX - 0.5, p);
    py = Math.sin(p * Math.PI) * 0.2;
    rz = Math.sin(p * Math.PI) * 0.02;
    ry = lerp(0.15, 0, p);
  }
  else if (t <= 0.68) {
    // Slow approach
    const p = easeInOutCubic((t - 0.55) / 0.13);
    px = lerp(TX - 0.5, TX - 0.1, p); py = 0; rz = 0; ry = 0;
  }
  else if (t <= 0.76) {
    // Align
    const p = easeInOutCubic((t - 0.68) / 0.08);
    px = lerp(TX - 0.1, TX, p); py = 0; rz = 0; ry = 0;
  }
  else if (t <= 0.93) {
    // Insert
    const p = easeOutCubic((t - 0.76) / 0.17);
    px = lerp(TX, IX, p); py = 0; rz = 0; ry = 0;
  }
  else {
    // Settle
    const p = (t - 0.93) / 0.07;
    const b = Math.sin(p * Math.PI * 3.5) * (1-p) * 0.02;
    px = IX + b; py = 0; rz = 0; ry = 0;
  }
  return { px, py, rz, ry };
}

function rf(t) {
  const s = getState(t);
  pG.position.set(s.px, s.py, 0);
  pG.rotation.z = s.rz;
  pG.rotation.y = s.ry;
  renderer.render(scene3, camera);
  pfEl.style.width = (t * 100) + '%';
}

rf(0);

function animate(ts) {
  if (!st) st = ts;
  const t = Math.min((ts - st) / DUR, 1);
  rf(t);
  if (t < 1) aId = requestAnimationFrame(animate);
  else { playing = false; setTimeout(() => replayOverlay.classList.add('visible'), 500); }
}

function play() {
  if (playing) return;
  playing = true;
  replayOverlay.classList.remove('visible');
  if (aId) cancelAnimationFrame(aId);
  st = null; pfEl.style.width = '0%';
  pG.position.set(-4.5, 0, 0);
  pG.rotation.y = FACE_ROT;
  aId = requestAnimationFrame(animate);
}

replayBtn.addEventListener('click', e => { e.stopPropagation(); play(); });
sceneEl.addEventListener('click', play);
setTimeout(play, 400);
</script>
</body>
</html>
